{% extends "base.html" %}
{% block title %}{{ title }} — {{ model.__class__.__name__ }}{% endblock %}

{% block content %}
<div class="page-header d-print-none mt-3">
  <div class="row align-items-center">
    <div class="col">
      <h2 class="page-title">{{ title }}</h2>
    </div>
  </div>
</div>

<div class="card mt-3">
  <div class="card-body">
    <div id="chart-view"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  function formatApexValue(val, fmt) {
    if (!fmt) return val.toLocaleString();
    var v = val * (fmt.multiplier || 1);
    var scaleMap = { thousands: 1e3, millions: 1e6, billions: 1e9, trillions: 1e12 };
    if (fmt.scale && scaleMap[fmt.scale]) v = v / scaleMap[fmt.scale];
    var str;
    if (fmt.thousands) {
      str = v.toLocaleString('en-US', {
        minimumFractionDigits: fmt.decimals,
        maximumFractionDigits: fmt.decimals
      });
    } else {
      str = v.toFixed(fmt.decimals);
    }
    return (fmt.prefix || '') + str + (fmt.suffix || '');
  }

  var spec = {{ chart_data | safe }};
  var isStacked = spec.chart_type === 'stacked_bar';
  var options = {
    chart: {
      type: (spec.chart_type === 'line') ? 'line' : 'bar',
      stacked: isStacked,
      height: 400,
      toolbar: { show: false },
      zoom: { enabled: false },
    },
    series: spec.series,
    xaxis: { categories: spec.categories },
    yaxis: { labels: { formatter: function (val) { return formatApexValue(val, spec.yaxis_format); } } },
    stroke: spec.chart_type === 'line' ? { curve: 'straight', width: 2 } : {},
    markers: spec.chart_type === 'line' ? { size: 4 } : {},
    dataLabels: isStacked ? { formatter: function (val) { return formatApexValue(val, spec.yaxis_format); } } : { enabled: false },
    tooltip: { y: { formatter: function (val) { return formatApexValue(val, spec.yaxis_format); } } },
    grid: { borderColor: '#e5e7eb' },
  };
  new ApexCharts(document.querySelector('#chart-view'), options).render();
}());
</script>
{% endblock %}
